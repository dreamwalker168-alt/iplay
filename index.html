<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
  <title>愛玩旅遊 - 線上數位簽署系統</title>
  <style>
    /* ==========================================
       基礎桌機版樣式
       ========================================== */
    body { 
      font-family: "Microsoft JhengHei", sans-serif; 
      background-color: #f1f5f9; 
      color: #334155; 
      margin: 0; 
      padding: 15px; 
      -webkit-text-size-adjust: 100%; 
      overflow-y: auto; /* 確保全網頁只有最外層這一個主捲軸 */
    }
    .selector-container { 
      max-width: 800px; 
      margin: 0 auto 15px auto; 
      background: #ffffff; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
      border: 1px solid #e2e8f0; 
      box-sizing: border-box; 
    }
    h2 { 
      color: #0284c7; 
      text-align: center; 
      margin-top: 0; 
      margin-bottom: 15px; 
      font-size: 20px; 
    }
    .grid-select { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 15px; 
    }
    label { 
      display: block; 
      font-weight: bold; 
      margin-bottom: 6px; 
      font-size: 14px; 
      color: #475569; 
    }
    select { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      box-sizing: border-box; 
      font-size: 15px; 
      background-color: #fff; 
      color: #1e293b; 
      cursor: pointer; 
      -webkit-appearance: none; 
    }
    select:focus { 
      outline: none; 
      border-color: #0284c7; 
      box-shadow: 0 0 0 3px rgba(2,132,199,0.1); 
    }
    
    /* 條款內容平鋪容器 */
    #contentWrapper { 
      max-width: 800px; 
      margin: 0 auto; 
      display: none; 
      border: 1px solid #cbd5e1; 
      border-radius: 12px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
      background: #ffffff; 
      padding: 20px;
      height: auto !important; 
      overflow: visible !important; 
    }

    /* 終極覆蓋：強制消除被 Fetch 進來的子網頁自帶的滾動條與高度限制 */
    #contentWrapper html, 
    #contentWrapper body {
      overflow: visible !important;
      height: auto !important;
      min-height: unset !important;
      max-height: unset !important;
      padding: 0 !important;
      margin: 0 !important;
      background: transparent !important;
    }
    #contentWrapper .container, 
    #contentWrapper .wrapper,
    #contentWrapper [class*="container"],
    #contentWrapper [class*="wrapper"] {
      height: auto !important;
      overflow: visible !important;
    }

    /* ==========================================
       🎯 終極優化：手機版 (螢幕小於 600px) 左右空白歸零
       ========================================== */
    @media (max-width: 600px) { 
      body { 
        padding: 0 !important;             /* 1. 徹底拔除網頁最外圈的灰色大死白邊 */
        background-color: #ffffff !important; /* 2. 背景改為全白，讓條文與外殼視覺一體化 */
      }
      
      .selector-container { 
        border-radius: 0px !important;     /* 3. 選單取消圓角，直接貼邊填滿手機寬度 */
        margin: 0 0 10px 0 !important;
        padding: 12px 10px !important; 
        border-left: none !important;
        border-right: none !important;
      }
      
      .grid-select { 
        grid-template-columns: 1fr; 
        gap: 12px; 
      }  
      
      /* 4. 徹底解放條文容器，消除左右外距與外框，橫向 100% 撐滿 */
      #contentWrapper { 
        border-radius: 0px !important;     /* 拿掉圓角 */
        border-left: none !important;      /* 拿掉左右邊框，擠出所有寬度 */
        border-right: none !important;
        box-shadow: none !important;       /* 拿掉陰影 */
        padding: 10px 8px !important;      /* 5. 內部襯距縮到最小(左右各留8px防貼字即可) */
        margin: 0 !important;
        width: 100% !important;            /* 強制滿版 */
      }
      
      /* 6. 確保被載入進來的子網頁內部寬度與襯距同步歸零貼邊 */
      #contentWrapper html, 
      #contentWrapper body,
      #contentWrapper .container,
      #contentWrapper [class*="page-inside"] {
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
      }
      
      /* 7. 針對手機版 Canvas 簽名畫布強制擴大至完美高度 */
      #contentWrapper canvas,
      #contentWrapper #sigCanvas,
      #contentWrapper [id*="Canvas"],
      #contentWrapper [class*="canvas"] {
        width: 100% !important;
        height: 320px !important;          /* 釋放高度，大拇指極佳書寫空間 */
      }
    }

    #loadingOverlay { 
      display: none; 
      position: fixed; 
      top:0; left:0; width:100%; height:100%; 
      background:rgba(255,255,255,0.9); 
      z-index:9999; 
      text-align:center; 
      padding-top:200px; 
      font-size:18px; 
      font-weight:bold; 
      color:#0284c7; 
    }
  </style>
</head>
<body>

<div id="loadingOverlay">正在安全載入專屬填單系統，請稍候...</div>

<div class="selector-container">
  <h2>愛玩旅遊 線上數位文件簽署中心</h2>
  <div class="grid-select">
    <div>
      <label>第一步：請選擇您參加的團體行程</label>
      <select id="tourSelect" onchange="onTourChanged()">
        <option value="">-- 正在連線資料庫，請稍候 --</option>
      </select>
    </div>
    <div>
      <label>第二步：請選擇要簽署的文件類型</label>
      <select id="formTypeSelect" onchange="onFormTypeChanged()" disabled style="background-color: #f8fafc; cursor: not-allowed;">
        <option value="">-- 請先選取團體行程 --</option>
      </select>
    </div>
  </div>
</div>

<div id="contentWrapper"></div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPgA4E4cvDEKqJ4X6gWzfMsi68OBsAbUMAGItH2o3w45spp0gkNmN-FTp0f_gVe7sb/exec";

  let selectedTourDetails = null;

  window.addEventListener('DOMContentLoaded', () => {
    loadAllTours();
  });

  function loadAllTours() {
    fetch(`${GAS_WEB_APP_URL}?action=getAllTours`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          const select = document.getElementById('tourSelect');
          select.innerHTML = '<option value="">-- 請選擇您參加的團體 --</option>';
          data.tours.forEach(tour => {
            let opt = document.createElement('option');
            opt.value = tour.tourId;
            opt.textContent = `[${tour.tourId}] ${tour.tourName}`;
            select.appendChild(opt);
          });
        }
      }).catch(err => alert("與愛玩旅遊資料庫連線失敗"));
  }

  function onTourChanged() {
    const tourId = document.getElementById('tourSelect').value;
    const formTypeSelect = document.getElementById('formTypeSelect');
    const contentWrapper = document.getElementById('contentWrapper');
    
    contentWrapper.style.display = "none";
    contentWrapper.innerHTML = ""; 
    formTypeSelect.value = "";

    if(!tourId) {
      formTypeSelect.disabled = true;
      formTypeSelect.style.backgroundColor = "#f8fafc";
      formTypeSelect.style.cursor = "not-allowed";
      formTypeSelect.innerHTML = '<option value="">-- 請先選取團體行程 --</option>';
      return;
    }

    document.getElementById('loadingOverlay').style.display = "block";

    fetch(`${GAS_WEB_APP_URL}?action=getTour&tourId=${encodeURIComponent(tourId)}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loadingOverlay').style.display = "none";
        if(data.status === "success") {
          selectedTourDetails = data;
          formTypeSelect.disabled = false;
          formTypeSelect.style.backgroundColor = "#fff";
          formTypeSelect.style.cursor = "pointer";
          formTypeSelect.innerHTML = `
            <option value="">-- 請點選要簽署的文件 --</option>
            <option value="affidavit.html">📄 自帶證照切結書</option>
            <option value="contract.html">✍️ 國外旅遊定型化契約書</option>
          `;
        } else {
          alert(data.message);
        }
      });
  }

  function onFormTypeChanged() {
    const targetHtmlFile = document.getElementById('formTypeSelect').value;
    const contentWrapper = document.getElementById('contentWrapper');

    if(!targetHtmlFile) {
      contentWrapper.style.display = "none";
      contentWrapper.innerHTML = "";
      return;
    }

    document.getElementById('loadingOverlay').style.display = "block";

    // 1. 動態讀取 HTML 檔案文字
    fetch(targetHtmlFile)
      .then(response => {
        if(!response.ok) throw new Error("找不到網頁檔案");
        return response.text();
      })
      .then(htmlText => {
        document.getElementById('loadingOverlay').style.display = "none";
        contentWrapper.style.display = "block";
        
        // 2. 將 HTML 內文塞入容器
        contentWrapper.innerHTML = htmlText;

        // 3. 解析並動態執行子網頁裡的 JavaScript
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const scripts = doc.querySelectorAll('script');
        
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });

        // 4. 動態注入網址參數
        window.urlParams = {
          tourId: selectedTourDetails.tourId,
          tourName: selectedTourDetails.tourName,
          tourDate: selectedTourDetails.tourDate
        };

        // 5. 畫面流暢滾動至條款起點
        contentWrapper.scrollIntoView({ behavior: 'smooth' });
      })
      .catch(err
