<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>愛玩旅遊 - 線上數位簽署系統</title>
  <style>
    /* ==========================================
       基礎桌機版樣式
       ========================================== */
    body { 
      font-family: "Microsoft JhengHei", sans-serif; 
      background-color: #f1f5f9; 
      color: #334155; 
      margin: 0; 
      padding: 15px; 
      -webkit-text-size-adjust: 100%; 
      overflow-y: auto; 
    }
    .selector-container { 
      max-width: 800px; 
      margin: 0 auto 15px auto; 
      background: #ffffff; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
      border: 1px solid #e2e8f0; 
      box-sizing: border-box; 
    }
    h2 { 
      color: #0284c7; 
      text-align: center; 
      margin-top: 0; 
      margin-bottom: 15px; 
      font-size: 20px; 
    }
    .grid-select { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 15px; 
    }
    label { 
      display: block; 
      font-weight: bold; 
      margin-bottom: 6px; 
      font-size: 14px; 
      color: #475569; 
    }
    select { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      box-sizing: border-box; 
      font-size: 15px; 
      background-color: #fff; 
      color: #1e293b; 
      cursor: pointer; 
      -webkit-appearance: none; 
    }
    select:focus { 
      outline: none; 
      border-color: #0284c7; 
      box-shadow: 0 0 0 3px rgba(2,132,199,0.1); 
    }
    
    /* 條款內容平鋪容器 */
    #contentWrapper { 
      max-width: 800px; 
      margin: 0 auto; 
      display: none; 
      border: 1px solid #cbd5e1; 
      border-radius: 12px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
      background: #ffffff; 
      padding: 20px;
      height: auto !important; 
      overflow: visible !important; 
    }

    /* 確保消除被 Fetch 進來的子網頁自帶的滾動條與高度限制 */
    #contentWrapper html, 
    #contentWrapper body {
      overflow: visible !important;
      height: auto !important;
      min-height: unset !important;
      max-height: unset !important;
      padding: 0 !important;
      margin: 0 !important;
      background: transparent !important;
    }

    /* ==========================================
       🎯 手機版左右完全歸零，終極極致滿版
       ========================================== */
    @media (max-width: 600px) { 
      body { 
        padding: 0 !important;             
        margin: 0 !important;
        background-color: #ffffff !important; 
        width: 100% !important;
        overflow-x: hidden; /* 防止任何子元件不小心溢出產生橫向滾動條 */
      }
      
      /* 第一步、第二步的選單容器：徹底打平貼死 */
      .selector-container { 
        border-radius: 0px !important;     
        margin: 0 0 10px 0 !important;
        padding: 15px 12px !important; /* 上下保留舒適距離，左右適度留白讓選單好點擊 */
        border: none !important;
        width: 100% !important;
        box-sizing: border-box !important;
        box-shadow: none !important; /* 滿版時拿掉陰影更乾淨 */
      }
      
      .grid-select { 
        grid-template-columns: 1fr; 
        gap: 12px; 
      }  
      
      /* 下方內嵌條款文件容器：徹底打平 */
      #contentWrapper { 
        border-radius: 0px !important;     
        border: none !important;           
        box-shadow: none !important;       
        padding: 0px !important; /* 主容器內襯完全歸 0 */          
        margin: 0 !important;
        width: 100% !important;            
        max-width: 100% !important;
        box-sizing: border-box !important;
      }
      
      /* 🎯 關鍵修正：強行破除子網頁帶進來的所有外層包覆區塊的外距(Margin)與內襯(Padding) */
      #contentWrapper html,
      #contentWrapper body,
      #contentWrapper div,
      #contentWrapper section,
      #contentWrapper .container, 
      #contentWrapper .wrapper,
      #contentWrapper .card,
      #contentWrapper [class*="container"],
      #contentWrapper [class*="wrapper"],
      #contentWrapper [class*="card"],
      #contentWrapper [class*="content"] {
        padding: 0px !important;   /* 左右內襯直接強制歸 0，消除白邊 */
        margin: 0px !important;    /* 消除所有卡片自帶的外距 */
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
        border-radius: 0px !important;     
        border: none !important;
      }

      /* 🎯 為了避免文字直接貼死螢幕玻璃，只針對純文字標籤與表格內部給予微幅的左右內襯 */
      #contentWrapper p,
      #contentWrapper span,
      #contentWrapper h1,
      #contentWrapper h2,
      #contentWrapper h3,
      #contentWrapper h4,
      #contentWrapper li,
      #contentWrapper .text-block {
        padding-left: 14px !important;     
        padding-right: 14px !important;
        margin-top: 8px !important;
        margin-bottom: 8px !important;
        box-sizing: border-box !important;
      }

      /* 確保子網頁內部的表格、合約條款區塊也能完整橫向伸展 */
      #contentWrapper table {
        width: 100% !important;
        max-width: 100% !important;
        margin: 10px 0 !important;
        box-sizing: border-box !important;
      }
      
      #contentWrapper td,
      #contentWrapper th {
        padding: 8px !important; /* 表格內部格線留點空間比較好閱讀 */
      }
      
      /* 手機版 Canvas 簽名畫布強制擴大，左右留下一點點安全簽名邊距 */
      #contentWrapper canvas,
      #contentWrapper #sigCanvas,
      #contentWrapper [id*="Canvas"],
      #contentWrapper [class*="canvas"] {
        width: calc(100% - 20px) !important;
        margin: 10px auto !important;
        display: block !important;
        height: 280px !important;          
      }
    }

    #loadingOverlay { 
      display: none; 
      position: fixed; 
      top:0; left:0; width:100%; height:100%; 
      background:rgba(255,255,255,0.9); 
      z-index:9999; 
      text-align:center; 
      padding-top:200px; 
      font-size:18px; 
      font-weight:bold; 
      color:#0284c7; 
    }
  </style>
</head>
<body>

<div id="loadingOverlay">正在安全載入專屬填單系統，請稍候...</div>

<div class="selector-container">
  <h2>愛玩旅遊 線上數位文件簽署中心</h2>
  <div class="grid-select">
    <div>
      <label>第一步：請選擇您參加的團體行程</label>
      <select id="tourSelect" onchange="onTourChanged()">
        <option value="">-- 正在連線資料庫，請稍候 --</option>
      </select>
    </div>
    <div>
      <label>第二步：請選擇要簽署的文件類型</label>
      <select id="formTypeSelect" onchange="onFormTypeChanged()" disabled style="background-color: #f8fafc; cursor: not-allowed;">
        <option value="">-- 請先選取團體行程 --</option>
      </select>
    </div>
  </div>
</div>

<div id="contentWrapper"></div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPgA4E4cvDEKqJ4X6gWzfMsi68OBsAbUMAGItH2o3w45spp0gkNmN-FTp0f_gVe7sb/exec";

  let selectedTourDetails = null;

  window.addEventListener('DOMContentLoaded', () => {
    loadAllTours();
  });

  function loadAllTours() {
    fetch(`${GAS_WEB_APP_URL}?action=getAllTours`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          const select = document.getElementById('tourSelect');
          select.innerHTML = '<option value="">-- 請選擇您參加的團體 --</option>';
          data.tours.forEach(tour => {
            let opt = document.createElement('option');
            opt.value = tour.tourId;
            opt.textContent = `[${tour.tourId}] ${tour.tourName}`;
            select.appendChild(opt);
          });
        }
      }).catch(err => alert("與愛玩旅遊資料庫連線失敗"));
  }

  function onTourChanged() {
    const tourId = document.getElementById('tourSelect').value;
    const formTypeSelect = document.getElementById('formTypeSelect');
    const contentWrapper = document.getElementById('contentWrapper');
    
    contentWrapper.style.display = "none";
    contentWrapper.innerHTML = ""; 
    formTypeSelect.value = "";

    if(!tourId) {
      formTypeSelect.disabled = true;
      formTypeSelect.style.backgroundColor = "#f8fafc";
      formTypeSelect.style.cursor = "not-allowed";
      formTypeSelect.innerHTML = '<option value="">-- 請先選取團體行程 --</option>';
      return;
    }

    document.getElementById('loadingOverlay').style.display = "block";

    fetch(`${GAS_WEB_APP_URL}?action=getTour&tourId=${encodeURIComponent(tourId)}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loadingOverlay').style.display = "none";
        if(data.status === "success") {
          selectedTourDetails = data;
          formTypeSelect.disabled = false;
          formTypeSelect.style.backgroundColor = "#fff";
          formTypeSelect.style.cursor = "pointer";
          formTypeSelect.innerHTML = `
            <option value="">-- 請點選要簽署的文件 --</option>
            <option value="affidavit.html">📄 自帶證照切結書</option>
            <option value="contract.html">✍️ 國外旅遊定型化契約書</option>
          `;
        } else {
          alert(data.message);
        }
      });
  }

  function onFormTypeChanged() {
    const targetHtmlFile = document.getElementById('formTypeSelect').value;
    const contentWrapper = document.getElementById('contentWrapper');

    if(!targetHtmlFile) {
      contentWrapper.style.display = "none";
      contentWrapper.innerHTML = "";
      return;
    }

    document.getElementById('loadingOverlay').style.display = "block";

    fetch(targetHtmlFile)
      .then(response => {
        if(!response.ok) throw new Error("找不到網頁檔案");
        return response.text();
      })
      .then(htmlText => {
        document.getElementById('loadingOverlay').style.display = "none";
        contentWrapper.style.display = "block";
        
        // 先放入 HTML 結構
        contentWrapper.innerHTML = htmlText;

        // 🎯 關鍵連動修正：建立模擬的 URL 參數字串
        const mockQueryString = `?tourId=${encodeURIComponent(selectedTourDetails.tourId)}&tourName=${encodeURIComponent(selectedTourDetails.tourName)}&tourDate=${encodeURIComponent(selectedTourDetails.tourDate)}`;
        
        window.urlParams = {
          tourId: selectedTourDetails.tourId,
          tourName: selectedTourDetails.tourName,
          tourDate: selectedTourDetails.tourDate
        };

        // 解析並執行子網頁腳本
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const scripts = doc.querySelectorAll('script');
        
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            let code = oldScript.textContent;
            
            // 🎯 核心修正 1：完美替換 window.location.search，讓子網頁原有的 URLSearchParams 邏輯能直接取到資料
            code = code.replace(/window\.location\.search/g, `"${mockQueryString}"`);
            
            // 🎯 核心修正 2：移除或替換原本會出錯的 $(document).ready，改成直接執行的封閉區塊防止全域污染
            code = code.replace(/window\.addEventListener\s*\(\s*['"]DOMContentLoaded['"]\s*,\s*function\s*\(\s*\)\s*\{/g, '{');
            code = code.replace(/window\.addEventListener\s*\(\s*['"]DOMContentLoaded['"]\s*,\s*\(\s*\)\s*=>\s*\{/g, '{');
            
            newScript.textContent = code;
          }
          // 🎯 核心修正 3：將腳本加入到 contentWrapper 內，這樣更換文件時才會被一併清空
          contentWrapper.appendChild(newScript);
        });

        // 🎯 核心修正 4：子網頁載入後，強制觸發資料填充邏輯
        if (typeof injectTourDataToFields === "function") {
          injectTourDataToFields(selectedTourDetails);
        } else {
          // 備用機制：適度拉長延遲至 300ms 確保 DOM 完全生成
          setTimeout(() => {
            if(document.getElementById('tourId')) document.getElementById('tourId').value = selectedTourDetails.tourId || '';
            if(document.getElementById('display-tourId')) document.getElementById('display-tourId').innerText = selectedTourDetails.tourId || '--';
            if(document.getElementById('display-tourDate')) document.getElementById('display-tourDate').innerText = selectedTourDetails.tourDate || '--';
            if(document.getElementById('display-tourName')) document.getElementById('display-tourName').innerText = selectedTourDetails.tourName || '--';
            if(document.getElementById('field-tourName')) document.getElementById('field-tourName').innerText = selectedTourDetails.tourName || '--';
            if(document.getElementById('field-tourDestination')) document.getElementById('field-tourDestination').innerText = selectedTourDetails.tourDestination || '--';
            if(document.getElementById('field-tourAssembleTime')) document.getElementById('field-tourAssembleTime').innerText = selectedTourDetails.tourAssembleTime || '--';
            if(document.getElementById('field-tourAssemblePlace')) document.getElementById('field-tourAssemblePlace').innerText = selectedTourDetails.tourAssemblePlace || '--';
            if(document.getElementById('field-tourFeeText')) document.getElementById('field-tourFeeText').innerText = selectedTourDetails.tourFeeText || '--';
            if(document.getElementById('field-paymentAmount1')) document.getElementById('field-paymentAmount1').innerText = selectedTourDetails.paymentAmount1 || '--';
            if(document.getElementById('field-minTourPeople')) document.getElementById('field-minTourPeople').innerText = selectedTourDetails.minTourPeople || '--';
            
            // 處理行程表連結
            const itineraryLink = document.getElementById('itinerary-link');
            const itineraryText = document.getElementById('itinerary-tourName-text');
            if (itineraryLink && itineraryText) {
                if(selectedTourDetails.tourItineraryTable && selectedTourDetails.tourItineraryTable.startsWith('http')) {
                    let pdfUrl = selectedTourDetails.tourItineraryTable.trim();
                    if (pdfUrl.includes('drive.google.com') && pdfUrl.includes('/view')) {
                        pdfUrl = pdfUrl.split('/view')[0] + '/preview';
                    }
                    itineraryLink.href = pdfUrl;
                    itineraryLink.target = "_blank";
                    itineraryText.innerText = `點此線上檢閱：${selectedTourDetails.tourName || '本團'} - 官方行程表檔案`;
                } else if (selectedTourDetails.tourItineraryTable) {
                    itineraryLink.removeAttribute('href');
                    itineraryText.innerText = selectedTourDetails.tourItineraryTable;
                }
            }
            
            // 隱藏子網頁內建的獨立載入提示
            const subLoading = document.getElementById('loading-status');
            if(subLoading) subLoading.style.display = 'none';
          }, 300);
        }

        contentWrapper.scrollIntoView({ behavior: 'smooth' });
      })
      .catch(err => {
        document.getElementById('loadingOverlay').style.display = "none";
        console.error(err);
        alert("載入條款文件失敗，請確認檔案是否存在。");
      });
  }
</script>

</body>
</html>
</html>
